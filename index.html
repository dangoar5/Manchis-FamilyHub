<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Hub</title>
        <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>



<body>

    <header>

    <div class="logo">
        🏠 Gómez Sánchez
    </div>

    <div class="fecha" id="fecha">
        Cargando...
    </div>

    <div class="hora" id="hora">
        00:00
    </div>

    <div class="header-right">

        <span id="usuarioNombre"></span>

        <button id="btnLogin">Iniciar sesión</button>

    </div>

</header>

<main>

    <section class="card agenda">

    <div class="card-header">
        <h2><i class="fa-regular fa-calendar"></i> Agenda</h2>
    </div>
    <div class="card-body">

       <div class="toolbar">

    <div class="card-body" id="agenda-calendario"></div>
    <div class="card-body" id="agenda-planner"></div>

</div>

</section>

<section class="card tareas">

    <div class="card-header">
        <h2><i class="fa-solid fa-list-check"></i> Tareas</h2>
    </div>

    <div class="card-body">

       <div class="toolbar">

    <button id="btnNuevaTarea">
        <i class="fa-solid fa-plus"></i> Nueva
    </button>

</div>

<div id="tareas-planner"></div>

    </div>

</section>

<section class="card alertas">

    <div class="card-header">
        <h2><i class="fa-regular fa-bell"></i> Alertas</h2>

<button class="btn-card" id="btnAlertas">+</button>
    </div>

    <div class="card-body" id="alertas">

</div>

</section>

<section class="card mercado">

    <div class="card-header">
        <h2><i class="fa-solid fa-cart-shopping"></i> Mercado</h2>
<button class="btn-card" id="btnMercado">+</button>
    </div>

    <div class="card-body" id="mercado">

</div>

</section>

<section class="card notas">

    <div class="card-header">
        <h2><i class="fa-regular fa-note-sticky"></i> Notas</h2>

    </div>

    <div class="card-body">

    </div>

</section>

</main>


<div id="modal" class="modal oculto">

    <div class="modal-contenido">

        <h3 id="modalTitulo"></h3>

        <input
            type="text"
            id="modalInput"
            placeholder=""
        >

        <div class="modal-botones">

            <button id="btnCancelar">Cancelar</button>
            <button id="btnAceptar">Aceptar</button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.2/lib/msal-browser.min.js"></script>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/components.js"></script>
<script src="js/services.js"></script>
<script src="js/ui.js"></script>
<script src="js/modal.js"></script>
<script src="js/alertas.js"></script>
<script src="js/mercado.js"></script>
<script src="js/agenda.js"></script>
<script src="js/tareas.js"></script>
<script src="js/script.js"></script>


</body>

</html>
